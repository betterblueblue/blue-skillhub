name: Eval Checks

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  eval-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse real-project JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path("eval/real-projects").rglob("*.json")):
              with path.open("r", encoding="utf-8") as f:
                  json.load(f)
              print(path)
          PY

      - name: Validate real-project matrix
        run: python eval/real-projects/scripts/validate_real_projects.py

      - name: Run impact validator tests
        run: python skills/impact/tests/test_scripts/test_impact_validate.py

      - name: Run pathfinder validator tests
        run: python skills/pathfinder/tests/test_scripts/test_pathfinder_scripts.py

      - name: Run delivery checker tests
        run: python -m unittest discover -s eval/real-projects/tests -p "test_*.py"

      - name: Install CI dependencies
        run: pip install pyyaml pytest

      - name: Run IntentAnchor validator tests
        run: python skills/intent-anchor/tests/test_intent_validate.py

      - name: Run tests/run.sh scripts
        run: |
          for dir in skills/*/tests; do
            if [ -f "$dir/run.sh" ]; then
              echo "Running $dir/run.sh"
              bash "$dir/run.sh" || exit 1
            fi
          done

      - name: Check template sync
        run: python scripts/sync_templates.py --check

      - name: Validate skill metadata
        run: |
          python - <<'PY'
          import re, sys, yaml
          from pathlib import Path
          errors = []
          for skill_md in sorted(Path("skills").rglob("SKILL.md")):
              text = skill_md.read_text(encoding="utf-8")
              if not text.startswith("---"):
                  errors.append(f"{skill_md}: missing frontmatter")
                  continue
              end = text.find("---", 3)
              if end == -1:
                  errors.append(f"{skill_md}: unclosed frontmatter")
                  continue
              try:
                  meta = yaml.safe_load(text[3:end])
              except Exception as e:
                  errors.append(f"{skill_md}: invalid YAML: {e}")
                  continue
              for field in ("name", "description", "allowed-tools"):
                  if field not in meta:
                      errors.append(f"{skill_md}: missing '{field}' in frontmatter")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          print("All skill metadata valid")
          PY
